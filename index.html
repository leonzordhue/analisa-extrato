<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>LAADV — Analisador de Extratos v5.2</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@700&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
<style>
:root{--teal:#0B4A44;--gold:#C9A93E;--white:#fff;--gray:#F5F7F9;--font:'DM Sans',sans-serif;--serif:'Cormorant Garamond',serif;}
body{font-family:var(--font);background:var(--gray);margin:0;color:#162030;}
.header{background:var(--teal);color:#fff;padding:1rem 2rem;border-bottom:3px solid var(--gold);display:flex;justify-content:space-between;align-items:center;}
.brand{font-family:var(--serif);font-size:1.5rem;font-weight:700;}
.main{max-width:1100px;margin:2rem auto;padding:0 1rem;}
.card{background:var(--white);padding:1.5rem;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,0.08);margin-bottom:1.5rem;}
.drop-zone{border:2px dashed #A8D4D0;background:#EBF5F4;padding:3rem;text-align:center;border-radius:10px;cursor:pointer;transition:0.3s;}
.drop-zone:hover{background:#D5ECEA;border-color:var(--teal);}
.btn{font-family:var(--font);font-weight:700;padding:.8rem 1.5rem;border:none;border-radius:8px;cursor:pointer;display:inline-flex;gap:8px;transition:0.2s;}
.btn-primary{background:var(--teal);color:#fff;}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 5px 15px rgba(11,74,68,0.3);}
.btn-outline{background:transparent;border:2px solid var(--teal);color:var(--teal);}
.log-box{background:#0a1a18;color:#7ecdc6;padding:1rem;font-family:monospace;font-size:.75rem;border-radius:8px;max-height:250px;overflow-y:auto;margin-top:1rem;display:none;}
.result-table{width:100%;border-collapse:collapse;margin-top:1rem;}
.result-table th{background:var(--teal);color:#fff;padding:12px;text-align:left;}
.result-table td{padding:12px;border-bottom:1px solid #ddd;}
.kpi{font-size:2rem;font-family:var(--serif);color:var(--teal);font-weight:700;}
</style>
</head>
<body>
<div class="header"><div class="brand">Luís Albert Advocacia</div><div style="font-size:0.7rem; opacity:0.7;">AKE v2.0 / UFT-1.0</div></div>
<div class="main">
    <div class="card">
        <div class="drop-zone" id="dropZone">📄 Arraste os extratos Bradesco aqui ou clique para selecionar</div>
        <input type="file" id="fileInput" multiple accept=".pdf" style="display:none">
        <div id="fileList" style="margin-top:1rem; font-size:0.85rem; color:var(--teal);"></div>
        <div style="margin-top:1.5rem; display:flex; gap:10px;">
            <button class="btn btn-primary" id="btnAnalisar">🔍 Analisar com IA</button>
            <button class="btn btn-outline" id="btnXLSX" disabled>📎 Baixar Planilha</button>
        </div>
        <div class="log-box" id="logBox"></div>
    </div>
    <div id="resultCard" class="card" style="display:none;">
        <div id="kpiArea" class="kpi">R$ 0,00</div>
        <div style="overflow-x:auto;"><table class="result-table"><thead><tr><th>Data</th><th>Descrição</th><th>Valor</th><th>Categoria</th></tr></thead><tbody id="tblBody"></tbody></table></div>
    </div>
</div>

<script>
const APPS_URL = 'https://script.google.com/macros/s/AKfycbyf3Mx1TH9d3aWD3iCJiRByrcUIT1YI9FvZDsbhWcvwcpzdjVxI2zutTlcgfnWdKrlf/exec';
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

let allItems = [], arquivos = [];

function log(m) {
    const b = document.getElementById('logBox');
    b.style.display = 'block';
    b.innerHTML += `<div>[${new Date().toLocaleTimeString()}] ${m}</div>`;
    b.scrollTop = b.scrollHeight;
}

// AXIOMA AKE-LIB-001: RECONSTRUÇÃO ESPACIAL ROBUSTA
async function extrairTexto(file) {
    const pdf = await pdfjsLib.getDocument({data: await file.arrayBuffer()}).promise;
    let full = "";
    for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const content = await page.getTextContent();
        const items = content.items.map(it => ({x: it.transform[4], y: it.transform[5], str: it.str}));
        if(!items.length) continue;

        let minX = Math.min(...items.map(it => it.x)), maxX = Math.max(...items.map(it => it.x));
        let xRange = Math.max(maxX - minX, 1);
        const linhasMap = {};
        items.forEach(it => {
            let y = Math.round(it.y);
            if(!linhasMap[y]) linhasMap[y] = [];
            linhasMap[y].push(it);
        });

        const sortedY = Object.keys(linhasMap).sort((a,b) => b - a);
        let pText = sortedY.map(y => {
            const grid = new Array(130).fill(' ');
            linhasMap[y].sort((a,b) => a.x - b.x).forEach(it => {
                let pos = Math.round(((it.x - minX) / xRange) * 110);
                for(let c=0; c<it.str.length && (pos+c)<130; c++) grid[pos+c] = it.str[c];
            });
            return grid.join('').trimEnd();
        }).filter(l => l.trim()).join('\n');
        full += `=== PÁGINA ${i} ===\n${pText}\n\n`;
    }
    return full;
}

// AXIOMA AKE-AXM-SYNC: BACKOFF PARA 429
async function analisar() {
    if(!arquivos.length) return;
    allItems = []; document.getElementById('btnAnalisar').disabled = true;
    
    for(let f of arquivos) {
        log(`Iniciando ${f.name}...`);
        const texto = await extrairTexto(f);
        const pgs = texto.split(/=== PÁGINA \d+ ===/);
        const chunks = [];
        for(let i=1; i<pgs.length; i+=6) chunks.push(pgs.slice(i, i+6).join('\n'));

        for(let ci=0; ci<chunks.length; ci++) {
            log(`Analisando bloco ${ci+1}/${chunks.length} de ${f.name}...`);
            try {
                const res = await fetch(APPS_URL, {method: 'POST', body: JSON.stringify({texto: chunks[ci]})});
                const data = await res.json();
                if(data.result) {
                    const parsed = JSON.parse(data.result).map(it => ({...it, valor: Math.abs(parseFloat(String(it.valor).replace(',','.')))}));
                    allItems.push(...parsed);
                }
                await new Promise(r => setTimeout(r, 4000)); // Resfriamento AKE
            } catch(e) { log(`Erro no bloco: ${e.message}`); }
        }
    }
    
    // Deduplicação (Hash Semântico)
    const seen = new Set();
    allItems = allItems.filter(it => {
        const hash = `${it.data}|${it.valor.toFixed(2)}|${it.descricao.toLowerCase().slice(0,15)}`;
        if(seen.has(hash)) return false;
        seen.add(hash); return true;
    });

    log(`Fim. ${allItems.length} lançamentos encontrados.`);
    renderizar();
    document.getElementById('btnAnalisar').disabled = false;
    document.getElementById('btnXLSX').disabled = false;
}

function renderizar() {
    document.getElementById('resultCard').style.display = 'block';
    const total = allItems.reduce((a,b) => a + b.valor, 0);
    document.getElementById('kpiArea').innerText = `R$ ${total.toLocaleString('pt-BR', {minimumFractionDigits:2})}`;
    document.getElementById('tblBody').innerHTML = allItems.map(it => `<tr><td>${it.data}</td><td>${it.descricao}</td><td>R$ ${it.valor.toFixed(2)}</td><td>${it.categoria}</td></tr>`).join('');
}

document.getElementById('dropZone').onclick = () => document.getElementById('fileInput').click();
document.getElementById('fileInput').onchange = e => {
    arquivos = Array.from(e.target.files);
    document.getElementById('fileList').innerHTML = arquivos.map(f => `• ${f.name}`).join('<br>');
};
document.getElementById('btnAnalisar').onclick = analisar;
document.getElementById('btnXLSX').onclick = () => {
    const ws = XLSX.utils.json_to_sheet(allItems);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Repeticao_Indebito");
    XLSX.writeFile(wb, "LAADV_Analise_Final.xlsx");
};
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>LAADV — Analisador de Extratos Bancários v5.1</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
<style>
:root{
  --teal:#0B4A44; --teal-mid:#145E58; --teal-light:#1C7A72; --teal-hover:#0d5a54;
  --teal-bg:#EBF5F4; --teal-brd:#A8D4D0;
  --gold:#C9A93E; --gold-light:#E8CB6E; --gold-dark:#9E8130; --gold-bg:#FBF5E0; --gold-brd:#E8CB6E;
  --white:#FFFFFF; --gray-bg:#F5F7F9; --gray-light:#EEF1F5; --gray-brd:#DDE3EC; --gray-mid:#8899AA;
  --text:#162030; --text-mid:#3D4F63;
  --success:#1A6B48; --success-bg:#E8F5EE; --success-brd:#A3D4BC;
  --error:#B02020; --error-bg:#FEF2F2; --error-brd:#F4AAAA;
  --orange:#B45309; --orange-bg:#FEF3C7; --orange-brd:#FCD34D;
  --font-serif:'Cormorant Garamond',Georgia,serif;
  --font:'DM Sans',system-ui,sans-serif;
  --radius:12px;
  --shadow:0 2px 18px rgba(11,74,68,.10),0 0 0 1px var(--gray-brd);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:var(--gray-bg);color:var(--text);min-height:100vh;}
.topbar{background:var(--teal);padding:.38rem 1.5rem;display:flex;align-items:center;justify-content:space-between;color:#fff;font-size:.62rem;text-transform:uppercase;letter-spacing:.1em;}
.site-header{background:var(--teal);border-bottom:3px solid var(--gold);padding:.85rem 1.5rem 1rem;position:sticky;top:0;z-index:200;box-shadow:0 4px 24px rgba(11,74,68,.3);}
.header-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;}
.brand{display:flex;align-items:center;gap:1rem;}
.brand-logo{width:44px;height:44px;border-radius:8px;background:var(--gold);display:flex;align-items:center;justify-content:center;}
.brand-name{font-family:var(--font-serif);font-size:1.3rem;font-weight:700;color:#fff;}
.hero{background:linear-gradient(135deg,var(--teal) 0%,var(--teal-mid) 100%);padding:2.2rem 1.5rem 3rem;color:#fff;}
.hero-inner{max-width:1200px;margin:0 auto;}
.hero-title{font-family:var(--font-serif);font-size:2.5rem;margin-bottom:.5rem;}
.main-wrap{max-width:1200px;margin:0 auto;padding:1.5rem;}
.card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:1.5rem;overflow:hidden;}
.card-head{background:linear-gradient(to right,var(--teal),var(--teal-mid));padding:.9rem 1.4rem;color:#fff;display:flex;justify-content:space-between;align-items:center;}
.card-body{padding:1.4rem;}
.drop-zone{border:2px dashed var(--teal-brd);border-radius:10px;background:var(--teal-bg);padding:2rem;text-align:center;cursor:pointer;}
.progress-bar{height:4px;background:var(--gray-brd);border-radius:10px;overflow:hidden;margin-top:1rem;}
.progress-fill{height:100%;background:linear-gradient(to right,var(--teal),var(--gold));width:0%;transition:width .3s;}
.log-box{background:#0a1a18;border-radius:8px;padding:.8rem 1rem;font-size:.7rem;font-family:monospace;color:#7ecdc6;max-height:200px;overflow-y:auto;margin-top:.9rem;display:none;white-space:pre-wrap;}
.btn{font-family:var(--font);font-size:.82rem;font-weight:700;border:none;border-radius:9px;padding:.7em 1.4em;cursor:pointer;display:inline-flex;align-items:center;gap:.45rem;}
.btn-primary{background:var(--teal);color:#fff;}
.btn-outline{background:transparent;color:var(--teal);border:1.5px solid var(--teal-brd);}
.btn-ghost{background:transparent;color:var(--gray-mid);border:1.5px solid var(--gray-brd);}
.result-table{width:100%;border-collapse:collapse;font-size:.78rem;}
.result-table thead{background:var(--teal);color:#fff;}
.result-table th, .result-table td{padding:.75rem 1rem;text-align:left;border-bottom:1px solid var(--gray-brd);}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:1rem;margin-bottom:1.5rem;}
.kpi-card{background:var(--white);border:1.5px solid var(--gray-brd);border-radius:10px;padding:1rem;}
.kpi-val{font-family:var(--font-serif);font-size:1.5rem;font-weight:700;color:var(--teal);}
</style>
</head>
<body>

<div class="topbar"><span>Luís Albert Advocacia — AKE v2.0</span><span>v5.1 Consolidada</span></div>
<header class="site-header"><div class="header-inner"><div class="brand"><div class="brand-logo">⚖️</div><div><div class="brand-name">Analisador de Extratos</div></div></div></div></header>

<div class="hero"><div class="hero-inner"><h1 class="hero-title">Inteligência Soberana</h1><p>Processamento offline de PDFs e Imagens com Motor Gemini AI.</p></div></div>

<div class="main-wrap">
  <div class="card">
    <div class="card-head"><span>Carregamento</span><span class="header-badge">PASS 1</span></div>
    <div class="card-body">
      <div class="drop-zone" id="dropZone">📄 Arraste os arquivos ou clique aqui</div>
      <input type="file" id="fileInput" multiple accept=".pdf,.jpg,.png" style="display:none">
      <div id="fileList" style="margin-top:10px; font-size:.8rem;"></div>
      <div class="progress-bar"><div class="progress-fill" id="pFill"></div></div>
      <div id="statusMsg" style="font-size:.75rem; margin-top:5px; color:var(--gray-mid)"></div>
      <div class="btn-row" style="margin-top:15px; display:flex; gap:10px;">
        <button class="btn btn-primary" id="btnAnalisar">🔍 Analisar com IA</button>
        <button class="btn btn-ghost" onclick="location.reload()">🗑 Limpar</button>
        <button class="btn btn-outline" id="btnXLSX" disabled>📎 Exportar XLSX</button>
      </div>
      <div class="log-box" id="logBox"></div>
    </div>
  </div>

  <div id="resultCard" style="display:none;">
    <div class="card">
      <div class="card-body"><div class="kpi-grid" id="kpiGrid"></div></div>
    </div>
    <div class="card">
      <div class="tbl-wrap">
        <table class="result-table">
          <thead><tr><th>Data</th><th>Descrição</th><th>Valor</th><th>Categoria</th></tr></thead>
          <tbody id="tblBody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
const APPS_URL = 'https://script.google.com/macros/s/AKfycbyf3Mx1TH9d3aWD3iCJiRByrcUIT1YI9FvZDsbhWcvwcpzdjVxI2zutTlcgfnWdKrlf/exec';
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

let allItems = [], arquivos = [];

// AXIOMA AKE-AXM-SYNC: RESILIÊNCIA CONTRA ERRO 429
async function chamarIAComRetry(payload, tentativa = 1) {
  try {
    const res = await fetch(APPS_URL, { method: 'POST', body: JSON.stringify(payload) });
    const data = await res.json();
    if (data.error && data.detail?.includes('429')) throw new Error('429');
    return data.result || '[]';
  } catch (e) {
    if (e.message === '429' && tentativa <= 3) {
      const ms = tentativa * 8000;
      log(`⚠️ Limite atingido. Esfriando motor por ${ms/1000}s...`, 'warn');
      await new Promise(r => setTimeout(r, ms));
      return chamarIAComRetry(payload, tentativa + 1);
    }
    throw e;
  }
}

// AXIOMA AKE-AXM-DEDUP: DEDUPLICAÇÃO POR HASH SEMÂNTICO
function deduplicar(itens) {
  const hash = it => `${it.dataStr}|${it.valor.toFixed(2)}|${it.descricao.toLowerCase().slice(0,25)}`;
  const unicos = new Map();
  itens.forEach(it => { if(!unicos.has(hash(it))) unicos.set(hash(it), it); });
  return Array.from(unicos.values());
}

// AXIOMA AKE-LIB-001: RECONSTRUÇÃO ESPACIAL DE LAYOUT
async function extrairTextoPDF(file) {
  const ab = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({data: ab}).promise;
  let fullText = "";
  const OUT_W = 130;

  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    const items = content.items.map(it => ({ x: it.transform[4], y: it.transform[5], str: it.str }));
    
    let minX = Math.min(...items.map(it => it.x)), maxX = Math.max(...items.map(it => it.x));
    let xRange = Math.max(maxX - minX, 1);
    
    const linhasMap = {};
    items.forEach(it => {
      let y = Math.round(it.y / 3) * 3;
      if(!linhasMap[y]) linhasMap[y] = [];
      linhasMap[y].push(it);
    });

    const sortedY = Object.keys(linhasMap).sort((a,b) => b - a);
    let pageText = sortedY.map(y => {
      const grid = new Array(OUT_W).fill(' ');
      linhasMap[y].sort((a,b) => a.x - b.x).forEach(it => {
        let pos = Math.round(((it.x - minX) / xRange) * (OUT_W - 20));
        for(let c=0; c<it.str.length && (pos+c)<OUT_W; c++) grid[pos+c] = it.str[c];
      });
      return grid.join('').trimEnd();
    }).filter(l => l.trim()).join('\n');
    
    fullText += `=== Página ${i}/${pdf.numPages} ===\n${pageText}\n\n`;
  }
  return fullText;
}

async function analisar() {
  if (!arquivos.length) return;
  allItems = []; document.getElementById('btnAnalisar').disabled = true;
  document.getElementById('logBox').style.display = 'block';

  for (let f of arquivos) {
    log(`📄 Lendo ${f.name}...`);
    const texto = await extrairTextoPDF(f);
    const pgs = texto.split(/=== Página \d+\/\d+ ===/);
    const chunks = [];
    for(let i=1; i<pgs.length; i+=8) chunks.push(pgs.slice(i, i+8).join('\n'));

    for (let ci = 0; ci < chunks.length; ci++) {
      log(`🤖 Analisando bloco ${ci+1}/${chunks.length} de ${f.name}...`);
      const raw = await chamarIAComRetry({ tipo: 'texto', texto: chunks[ci] });
      allItems.push(...parseItens(raw, f.name));
      await new Promise(r => setTimeout(r, 2000));
    }
  }

  allItems = deduplicar(allItems);
  log(`✅ Finalizado: ${allItems.length} lançamentos únicos.`, 'ok');
  renderizar();
  document.getElementById('btnAnalisar').disabled = false;
  document.getElementById('btnXLSX').disabled = false;
}

function parseItens(raw, arquivo) {
  try {
    let json = JSON.parse(raw);
    return json.map(it => ({
      ...it, 
      valor: Math.abs(parseFloat(String(it.valor).replace(',','.'))),
      dataStr: it.data,
      arquivo: arquivo
    })).filter(it => it.valor > 0);
  } catch(e) { return []; }
}

function renderizar() {
  document.getElementById('resultCard').style.display = 'block';
  const total = allItems.reduce((a,b) => a + b.valor, 0);
  document.getElementById('kpiGrid').innerHTML = `<div class="kpi-card"><div class="kpi-val">R$ ${total.toLocaleString('pt-BR')}</div><div>Total Geral</div></div>`;
  document.getElementById('tblBody').innerHTML = allItems.map(it => `<tr><td>${it.dataStr}</td><td>${it.descricao}</td><td>R$ ${it.valor.toFixed(2)}</td><td>${it.categoria}</td></tr>`).join('');
}

function log(m, t='') {
  const box = document.getElementById('logBox');
  box.innerHTML += `<div>[${new Date().toLocaleTimeString()}] ${m}</div>`;
  box.scrollTop = box.scrollHeight;
  document.getElementById('statusMsg').innerText = m;
}

function prog(p) { document.getElementById('pFill').style.width = p+'%'; }

const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
dropZone.onclick = () => fileInput.click();
fileInput.onchange = e => {
  arquivos = Array.from(e.target.files);
  document.getElementById('fileList').innerHTML = arquivos.map(f => `<div>• ${f.name}</div>`).join('');
};
document.getElementById('btnAnalisar').onclick = analisar;
document.getElementById('btnXLSX').onclick = () => {
  const ws = XLSX.utils.json_to_sheet(allItems);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Dados");
  XLSX.writeFile(wb, "Analise_LAADV.xlsx");
};
</script>
</body>
</html>
